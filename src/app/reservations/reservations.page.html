<ion-header>
  <ion-toolbar>
    <ion-title>Reservations</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="reservation-card">
    <h2>Reservations center</h2>
    <p>Create and manage upcoming bookings quickly.</p>
    <ion-button expand="block" size="large" (click)="goToCreateReservation()">
      <ion-icon slot="start" name="add-circle-outline"></ion-icon>
      New Reservation
    </ion-button>
  </div>

  <ion-list class="reservations-list">
    <ion-item *ngFor="let reservation of reservations">
      <ion-label>
        <h3>{{ reservation.id }} - {{ reservation.client }}</h3>
        <p>Date: {{ reservation.date }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
