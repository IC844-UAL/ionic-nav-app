<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/reservations"></ion-back-button>
    </ion-buttons>
    <ion-title>New Reservation</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="reservation-form">
    <ion-item lines="none">
      <ion-label position="stacked">Reservation Name</ion-label>
      <ion-input placeholder="Enter name"></ion-input>
    </ion-item>
    <p>Fill in the details for your new reservation.</p>
  </div>
</ion-content>
