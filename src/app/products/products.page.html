<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Products</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list class="products-list">
    <ion-item>
      <ion-label>
        <h2>Product 1</h2>
        <p>Description of product 1</p>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        <h2>Product 2</h2>
        <p>Description of product 2</p>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        <h2>Product 3</h2>
        <p>Description of product 3</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <div class="logout-wrapper">
    <ion-button color="danger" expand="block" size="large" (click)="onLogout()">
      <ion-icon slot="start" name="log-out-outline"></ion-icon>
      Cerrar Sesión
    </ion-button>
  </div>
</ion-content>
